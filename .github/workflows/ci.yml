name: CI

# Cost-aware matrix:
#   - every PR + push:  engine unit tests (Node 18/20/22) + stamp-android (ubuntu)
#   - manual dispatch only (parked):   stamp-ios (iOS out of active scope for now)
# The stamp jobs prove the CURRENT checkout's engine + template produce a
# project that actually builds — the reproducibility moat's gate.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: engine unit tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      # inspector/mcp is a SEPARATE package, not a workspace — a root install
      # does not reach it. `node --test` from the root discovers its test files
      # regardless, so without this step server-tools.test.mjs dies on
      # ERR_MODULE_NOT_FOUND for @modelcontextprotocol/sdk and the whole run is
      # red. It also means a local suite that passes (because those deps are
      # installed on the dev machine) is NOT the gate CI runs — the exact
      # false-green this project exists to prevent.
      - name: Install MCP server dependencies
        run: npm install --no-audit --no-fund --prefix inspector/mcp
      - name: Run tests
        run: node --test

  stamp-android:
    name: stamp + Android assembleDebug
    runs-on: ubuntu-latest # JDK + Android SDK preinstalled; licenses accepted
    needs: test # don't burn a Gradle build on a broken engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      # Gradle build/config caches, auto-keyed on gradle files (incl. the
      # template's version catalog once stamped). PRs read-only so they can't
      # poison the main cache.
      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
      # Engine is zero-dep in non-interactive mode (prompts/picocolors are
      # optional imports) — no npm install needed to stamp.
      - name: Stamp project (verify off — the build IS the verification here)
        run: >
          node bin/create-cmp.mjs "$RUNNER_TEMP/ci-smoke"
          --name CiSmoke --package com.ci.smoke
          --no-ios --no-verify --yes
      - name: Build stamped project (Android)
        shell: bash
        run: |
          set -o pipefail
          cd "$RUNNER_TEMP/ci-smoke"
          ./gradlew :composeApp:assembleDebug --stacktrace 2>&1 | tee "$RUNNER_TEMP/android-build.log"
      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: stamp-android-build-log
          path: ${{ runner.temp }}/android-build.log
          if-no-files-found: ignore

  stamp-ios:
    name: stamp + iOS xcodebuild
    runs-on: macos-15 # Apple Silicon — matches the arm64-only simulator build; newer image = newer default Xcode
    needs: test
    # iOS CI is PARKED for now (founder call, 2026-07-03): manual-dispatch only.
    # The leg is proven green (run 28683486610); re-enable per-push by restoring
    # the `|| (push && main)` clause when iOS returns to scope.
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
      - name: Install XcodeGen (CocoaPods is preinstalled on macOS runners)
        run: brew install xcodegen
      # Latest-brew XcodeGen + CocoaPods emit projects in the newest Xcode object
      # format; the image's *default* Xcode can lag and then xcodebuild fails with
      # "future Xcode project file format" (exactly what broke run #1 on macos-14:
      # format 77 vs Xcode 15.4). Always select the newest Xcode on the runner so
      # generator and builder agree.
      - name: Select newest installed Xcode
        run: |
          NEWEST=$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)
          echo "Selecting $NEWEST"
          sudo xcode-select -s "$NEWEST/Contents/Developer"
          xcodebuild -version
      - name: Stamp project (iOS on)
        run: >
          node bin/create-cmp.mjs "$RUNNER_TEMP/ci-smoke-ios"
          --name CiSmoke --package com.ci.smoke
          --no-verify --yes
      # Exact proven path from template/manifest.json `verify.iosLink` + `verify.ios`:
      # XcodeGen -> pod install (LANG=en_US.UTF-8 or CocoaPods trips on encoding)
      # -> xcodebuild constrained to arm64 + a concrete simulator UDID (the KMP
      # embed phase emits only the active-arch slice; a generic destination
      # fails at CreateUniversalBinary).
      - name: Link KMP framework (fast, isolates Kotlin/native failures)
        shell: bash
        run: |
          set -o pipefail
          cd "$RUNNER_TEMP/ci-smoke-ios"
          ./gradlew :composeApp:linkDebugFrameworkIosSimulatorArm64 --stacktrace 2>&1 | tee "$RUNNER_TEMP/ios-link.log"
      - name: Build stamped project (iOS simulator)
        shell: bash
        run: |
          set -o pipefail
          cd "$RUNNER_TEMP/ci-smoke-ios/iosApp"
          export LANG=en_US.UTF-8 LC_ALL=en_US.UTF-8
          xcodegen generate
          pod install
          SIM_UDID=$(xcrun simctl list devices available | grep -Eo '[0-9A-F-]{36}' | head -1)
          xcodebuild -workspace iosApp.xcworkspace -scheme iosApp -sdk iphonesimulator \
            -configuration Debug ARCHS=arm64 ONLY_ACTIVE_ARCH=YES EXCLUDED_ARCHS=x86_64 \
            -destination "id=$SIM_UDID" build 2>&1 | tee "$RUNNER_TEMP/ios-build.log"
      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: stamp-ios-build-logs
          path: |
            ${{ runner.temp }}/ios-link.log
            ${{ runner.temp }}/ios-build.log
          if-no-files-found: ignore
